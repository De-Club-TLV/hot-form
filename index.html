<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hot Form — De Club</title>
    <link rel="shortcut icon" href="assets/favicon.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@25.3.1/build/css/intlTelInput.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="page">
        <header class="header">
            <img src="assets/logo-declub.svg" alt="De Club" class="logo">
        </header>

        <section class="form-section">
            <div class="form-intro">
                <span class="eyebrow">Crew Intake</span>
                <h1 class="title">Hot Form</h1>
                <p class="subtitle">Log a referral or hot lead for the crew to follow up on.</p>
            </div>

            <form
                name="hot-leads"
                method="POST"
                data-netlify="true"
                data-netlify-honeypot="bot-field"
                class="lead-form"
                novalidate
            >
                <input type="hidden" name="form-name" value="hot-leads">
                <input type="hidden" name="phone_country" value="">
                <p class="honeypot" aria-hidden="true">
                    <label>Don't fill this out: <input name="bot-field"></label>
                </p>

                <div class="field">
                    <label for="submitted_by" class="label">Submitted By <span class="required">*</span></label>
                    <div class="select-wrap">
                        <select id="submitted_by" name="submitted_by" required>
                            <option value="" disabled selected>Select name</option>
                            <optgroup label="Crew">
                                <option>Dan Adika</option>
                                <option>Kfir Goldazki</option>
                                <option>Nir Elior</option>
                                <option>Orr Mezamer</option>
                                <option>Rachel Rinberg</option>
                                <option>Roy David</option>
                                <option>Shahar Perry</option>
                                <option>Yoni Katz</option>
                                <option>Yuval Katz</option>
                            </optgroup>
                            <optgroup label="Teachers">
                                <option>Adam Hadad</option>
                                <option>Adi Rotem</option>
                                <option>Arthur Abramov</option>
                                <option>Barak Zehavi</option>
                                <option>Gil Barshad</option>
                                <option>Hila Dekel</option>
                                <option>Iftach Vardi</option>
                                <option>Leehe Kandell</option>
                                <option>May Meytal</option>
                                <option>Maya Rozenshtein</option>
                                <option>Myriam Lahmi</option>
                                <option>Noa Bromfman</option>
                                <option>Noam Alon</option>
                                <option>Ranyana Balance</option>
                                <option>Romi Hanien</option>
                                <option>Roni Gozali</option>
                                <option>Roni Shtraus</option>
                                <option>Shay Reem</option>
                                <option>Tal Fridenberg</option>
                                <option>Yoel Eini</option>
                            </optgroup>
                        </select>
                        <svg class="select-arrow" viewBox="0 0 12 8" fill="none" aria-hidden="true">
                            <path d="M1 1.5L6 6.5L11 1.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                </div>

                <div class="field-row">
                    <div class="field">
                        <label for="first_name" class="label">First Name <span class="required">*</span></label>
                        <input type="text" id="first_name" name="first_name" autocomplete="given-name" required>
                    </div>
                    <div class="field">
                        <label for="last_name" class="label">Last Name <span class="required">*</span></label>
                        <input type="text" id="last_name" name="last_name" autocomplete="family-name" required>
                    </div>
                </div>

                <div class="field" data-field="phone">
                    <label for="phone" class="label">Phone Number <span class="required">*</span></label>
                    <input type="tel" id="phone" name="phone" autocomplete="tel" inputmode="tel" required>
                    <p class="field-error" id="phone-error" hidden>Please enter a valid phone number.</p>
                </div>

                <div class="field" data-field="email">
                    <label for="email" class="label">Email <span class="hint">Recommended</span></label>
                    <input type="email" id="email" name="email" autocomplete="email">
                    <p class="field-error" id="email-error" hidden>Please enter a valid email address.</p>
                </div>

                <div class="field">
                    <label for="notes" class="label">Additional Notes</label>
                    <textarea id="notes" name="notes" rows="4" placeholder="Anything the caller should know."></textarea>
                </div>

                <button type="submit" class="submit-btn">
                    <span class="btn-label">Submit</span>
                </button>

                <p class="form-footnote">Submissions are routed to the De Club crew for follow-up.</p>
            </form>

            <div class="success-panel" hidden role="status" aria-live="polite">
                <svg class="success-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <circle cx="12" cy="12" r="11" stroke="currentColor" stroke-width="1.5"/>
                    <path d="M7 12.5L10.5 16L17 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <h2 class="success-title">Lead logged</h2>
                <button type="button" class="secondary-btn" id="submit-another">Submit another</button>
            </div>
        </section>

        <footer class="footer">
            <span>© De Club TLV LTD</span>
        </footer>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/intl-tel-input@25.3.1/build/js/intlTelInput.min.js"></script>
    <script src="script.js" defer></script>
</body>
</html>
